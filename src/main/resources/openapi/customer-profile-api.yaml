openapi: 3.1.0
info:
  title: Customer Profile API
  description: API para consultar el perfil de clientes del banco
  version: 1.0.0
servers:
  - url: 'http://localhost:8080'
    description: Servidor local
paths:
  /customers/{customerId}:
    get:
      tags:
        - Customers
      summary: Consultar perfil de cliente
      operationId: getCustomerProfile
      parameters:
        - name: customerId
          in: path
          required: true
          description: Identificador único del cliente.
          schema:
            type: string
            example: CUS000001
      responses:
        "200":
          description: Perfil del cliente encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfileResponse"

        "400":
          description: Solicitud inválida.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "404":
          description: Cliente no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "500":
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    CustomerProfileResponse:
      type: object
      properties:
        customerId:
          type: string
          example: CUS000001
        documentType:
          type: string
          example: DNI
        documentNumber:
          type: string
          example: "71234567"
        fullName:
          type: string
          example: Juan Pérez Díaz
        status:
          type: string
          example: ACTIVE
        segment:
          type: string
          example: PREMIUM

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: CUSTOMER_NOT_FOUND
        message:
          type: string
          example: Cliente no encontrado.
  
